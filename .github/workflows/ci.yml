name: Employee Management CI-CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build-test-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}


      - name: Build Backend Image
        run: |
          docker build \
          -t pradeepdevops5281/employee-management-backend:v1 \
          ./backend


      - name: Build Frontend Image
        run: |
          docker build \
          -t pradeepdevops5281/employee-management-frontend:v1 \
          ./frontend


      - name: Push Backend Image
        run: |
          docker push pradeepdevops5281/employee-management-backend:v1


      - name: Push Frontend Image
        run: |
          docker push pradeepdevops5281/employee-management-frontend:v1
