name: Employee Management CI-CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build-test-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Set Image Tag
        id: image-tag
        run: echo "TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"


      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}


      - name: Build Backend Image
        run: |
          docker build \
          -t pradeepdevops5281/employee-management-backend:latest \
          -t pradeepdevops5281/employee-management-backend:${{ steps.image-tag.outputs.TAG }} \
          ./backend


      - name: Build Frontend Image
        run: |
          docker build \
          -t pradeepdevops5281/employee-management-frontend:latest \
          -t pradeepdevops5281/employee-management-frontend:${{ steps.image-tag.outputs.TAG }} \
          ./frontend


      - name: Push Backend Images
        if: github.event_name == 'push'
        run: |
          docker push pradeepdevops5281/employee-management-backend:latest
          docker push pradeepdevops5281/employee-management-backend:${{ steps.image-tag.outputs.TAG }}


      - name: Push Frontend Images
        if: github.event_name == 'push'
        run: |
          docker push pradeepdevops5281/employee-management-frontend:latest
          docker push pradeepdevops5281/employee-management-frontend:${{ steps.image-tag.outputs.TAG }}
